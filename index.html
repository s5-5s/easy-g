<!doctype html>
<html lang="ru">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-barstyle" content="green-translucent" />
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="google" value="notranslate" />
        <title>easy-g</title>
        <link rel="icon" type="image/x-icon" sizes="192x192" href="img/UI.ico" />
        <link rel="icon" type="image/x-icon" sizes="64x64" href="img/UI.ico" />
        <link rel="icon" type="image/x-icon" sizes="48x48" href="img/UI.ico" />
        <link rel="icon" type="image/x-icon" sizes="32x32" href="img/UI.ico" />
        <link rel="icon" type="image/x-icon" sizes="24x24" href="img/UI.ico" />
        <link rel="icon" type="image/x-icon" sizes="16x16" href="img/UI.ico" />
        <link rel="stylesheet" href="./css/layout.css" />
        <link rel="manifest" href="manifest.json?v=20260319c" />
        <script type="module" src="./js/index.js"></script>
    </head>
    <body>
        <div class="app-root" data-app-root>
            <div class="app" data-app>
                <main class="main" data-app-main>
                    <section class="model-panel" data-model-panel>
                        <div class="side-bar-host">
                            <aside class="side-bar" data-side-bar>
                                <div class="side-bar-head">
                                    <h2 class="side-bar-title" data-side-bar-title>Темы</h2>
                                    <button
                                        class="side-bar-toggle"
                                        type="button"
                                        aria-expanded="true"
                                        aria-label="Свернуть список тем"
                                        data-side-bar-toggle
                                    >
                                        <span
                                            class="side-bar-toggle-marker"
                                            aria-hidden="true"
                                            data-side-bar-toggle-marker
                                        >−</span>
                                    </button>
                                </div>
                                <div class="topic-list" data-topic-list></div>
                                <p class="side-bar-status" data-side-bar-status hidden></p>
                                <template data-topic-item-template>
                                    <article class="topic-item">
                                        <button class="topic-button" type="button" aria-expanded="false">
                                            <span class="topic-title"></span>
                                            <span class="topic-marker" aria-hidden="true">+</span>
                                        </button>
                                        <div class="topic-content" hidden>
                                            <p class="topic-description"></p>
                                        </div>
                                    </article>
                                </template>
                            </aside>
                        </div>
                        <div class="model-host">
                            <div class="model-view" data-model></div>
                        </div>
                    </section>
                </main>
            </div>
        </div>
    </body>
</html>
